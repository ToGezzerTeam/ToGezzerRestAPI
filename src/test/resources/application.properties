spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# RabbitMQ (messages) - valeurs de test
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

togezzer.rabbitmq.message-exchange=message.exchange
togezzer.rabbitmq.queue.chat-sauvegarde=queue-message-chat-sauvegarde
togezzer.rabbitmq.queue.live-chat-service=queue-message-live-chat-service
togezzer.rabbitmq.routing-key.chat-sauvegarde=routing-message-chat-sauvegarde
togezzer.rabbitmq.routing-key.live-chat-service=routing-message-live-chat-service

# Base URL pour appeler chat-sauvegarde
togezzer.chat-sauvegarde.base-url=http://localhost:8080
